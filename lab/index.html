<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>不听劝实验室 | Unsolicited Advice Lab</title>
  <link rel="stylesheet" href="../css/lab.css" />
</head>
<body>
  <div class="lab-shell">
    <header class="lab-header">
      <a class="back-link" href="../">MED-SPIRAL</a>
      <div class="lab-mark">
        <img class="lab-logo" src="../img/lab/lab-logo-dark.svg" alt="" />
        <div>
          <h1>不听劝实验室</h1>
          <p>Unsolicited Advice Lab</p>
        </div>
      </div>
      <span class="status-stamp">实验中<br>请勿全信</span>
    </header>

    <main>
      <section class="intro" aria-labelledby="lab-title">
        <p class="kicker">posters / prototypes / questionable decisions</p>
        <h2 id="lab-title">自己写的小东西，先贴墙上。</h2>
      </section>

      <section class="poster-wall" aria-label="不听劝实验室项目海报">
        <article class="poster-card poster-card-green">
          <img src="../img/lab/follow-or-fade.png" alt="Follow or Fade 项目海报" />
          <div class="poster-caption">
            <span>Follow or Fade</span>
            <small>AI 交易助手</small>
          </div>
        </article>

        <article class="poster-card poster-card-amber">
          <img src="../img/lab/saibo-banxian.png" alt="赛博半仙，在线起卦项目海报" />
          <div class="poster-caption">
            <span>赛博半仙，在线起卦</span>
            <small>公开事件复盘系统</small>
          </div>
        </article>

        <article class="poster-card poster-card-violet">
          <img src="../img/lab/mento.png" alt="mento 项目海报" />
          <div class="poster-caption">
            <span>mento</span>
            <small>Mentalization 搭子</small>
          </div>
        </article>

        <article class="poster-card poster-card-pink">
          <img src="../img/lab/buddy-firmware.png" alt="本命 Buddy，固件显灵项目海报" />
          <div class="poster-caption">
            <span>本命 Buddy，固件显灵</span>
            <small>离线固件召唤术</small>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
