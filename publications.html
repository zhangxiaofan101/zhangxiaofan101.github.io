<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications — Undefined Lab</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a class="nav-brand" href="index.html"><img src="img/logo.jpg" alt="" class="nav-logo"> Undefined Lab</a>
    <div class="nav-right">
      <a class="nav-link" href="index.html">About</a>
      <a class="nav-link" href="projects.html">Projects</a>
      <a class="nav-link" href="publications.html">Publications</a>
      <a class="nav-link" href="teaching.html">Teaching</a>
      <div class="nav-divider"></div>
      <a class="icon-btn" data-email href="#" aria-label="Email">
        <i class="fas fa-envelope"></i>
      </a>
      <a class="icon-btn"
         href="https://scholar.google.com/citations?user=30e95fEAAAAJ"
         target="_blank" rel="noopener" aria-label="Google Scholar">
        <i class="fas fa-graduation-cap"></i>
      </a>
    </div>
  </div>
</nav>

<main class="main">

  <h2 class="section-title" style="margin-top:0;"><span class="star">✦</span> Publications</h2>
  <p style="font-size:0.93rem; color:var(--text-muted); margin-bottom:1.5rem;">
    Fetched from
    <a href="https://scholar.google.com/citations?user=30e95fEAAAAJ" target="_blank" rel="noopener">Google Scholar</a>
    · sorted by year · <strong>Xiaofan Zhang</strong> highlighted
  </p>

  <div id="pub-container">
    <div class="pub-loading">
      <div class="spinner"></div><br>Loading publications…
    </div>
  </div>

</main>

<footer>
  ✦ Undefined Lab &nbsp;·&nbsp; Qing Yuan Research Institute, SJTU
</footer>

<script src="js/main.js"></script>
<script>
(function () {
  const container = document.getElementById('pub-container');

  function highlightSelf(str) {
    if (!str) return '';
    return str.replace(/(Xiaofan Zhang)/gi, '<strong>$1</strong>');
  }

  // Map venue string → badge class
  function badgeClass(venue) {
    if (!venue) return 'badge-mint';
    const v = venue.toLowerCase();
    if (/neurips|cvpr|iccv|eccv|icml|iclr/.test(v)) return 'badge-blue';
    if (/miccai|isbi|embc|midl/.test(v))            return 'badge-mint';
    if (/acl|emnlp|coling|naacl|aaai/.test(v))      return 'badge-yellow';
    if (/arxiv|preprint/.test(v))                    return 'badge-red';
    return 'badge-purple'; // journals (TMI, MedIA, JBHI, Nature, …)
  }

  function renderPubs(pubs) {
    if (!pubs || pubs.length === 0) {
      container.innerHTML = '<p class="pub-error">No publications found.</p>';
      return;
    }

    const byYear = {};
    for (const p of pubs) {
      const y = p.year || 'n.d.';
      (byYear[y] = byYear[y] || []).push(p);
    }
    const years = Object.keys(byYear).sort((a, b) => b.localeCompare(a));

    const html = [];
    for (const year of years) {
      html.push(`<p class="year-heading">${year}</p>`);
      for (const p of byYear[year]) {
        const bc      = badgeClass(p.venue);
        const linkBtn = p.url
          ? `<a class="pub-link" href="${p.url}" target="_blank" rel="noopener">
               <i class="fas fa-external-link-alt" style="font-size:.7em;margin-right:3px"></i>link
             </a>` : '';
        const citeBtn = p.citations > 0
          ? `<span class="pub-link">
               <i class="fas fa-quote-right" style="font-size:.7em;margin-right:3px"></i>${p.citations}
             </span>` : '';
        html.push(`
          <div class="pub-card">
            <div class="pub-meta">
              ${p.venue ? `<span class="badge ${bc}">${p.venue}</span>` : ''}
              ${p.year  ? `<span class="badge badge-yellow">${p.year}</span>` : ''}
            </div>
            <p class="pub-title">${p.url
              ? `<a href="${p.url}" target="_blank" rel="noopener">${p.title}</a>`
              : p.title}</p>
            <p class="pub-authors">${highlightSelf(p.authors)}</p>
            ${(linkBtn || citeBtn) ? `<div class="pub-links">${linkBtn}${citeBtn}</div>` : ''}
          </div>`);
      }
    }
    container.innerHTML = html.join('');
  }

  fetch('publications.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(renderPubs)
    .catch(err => {
      container.innerHTML = `
        <div class="pub-error">
          <strong>Publications not loaded yet.</strong><br>
          Run the GitHub Action <em>Fetch Publications from Google Scholar</em> once to
          generate <code>publications.json</code>, or view the full list on
          <a href="https://scholar.google.com/citations?user=30e95fEAAAAJ"
             target="_blank" rel="noopener">Google Scholar</a>.<br>
          <small style="opacity:.7;margin-top:.4rem;display:block">${err}</small>
        </div>`;
    });
})();
</script>
</body>
</html>
