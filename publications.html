<script src="js/main.js"></script>
<script>
(function () {
  const container = document.getElementById('pub-container');

  // Project tag mapping — [title substring (lowercase), project key]
  const PROJECT_MAP = [
    // Pathology
    ['pathorchestra',                                    'pathology'],
    ['pathfound',                                        'pathology'],
    ['pathoduet',                                        'pathology'],
    ['pd-l1 expression',                                 'pathology'],
    ['pathotune',                                        'pathology'],
    ['digestpath',                                       'pathology'],
    ['gastric cancer screening',                         'pathology'],
    ['large-scale retrieval for medical image analytics','pathology'],
    ['high-throughput histopathological',                'pathology'],
    ['fusing heterogeneous features from stacked sparse','pathology'],
    ['fine-grained histopathological image analysis',    'pathology'],
    ['weighted hashing with multiple cues for cell',     'pathology'],
    ['image-guided diagnosis of intraductal',            'pathology'],
    ['large-scale histopathological image analysis',     'pathology'],
    ['mining histopathological images',                  'pathology'],
    ['embedding label structures for fine-grained',      'pathology'],
    // Large Models
    ['guidegen',                                         'large-models'],
    ['medlsam',                                          'large-models'],
    ['synthet2c',                                        'large-models'],
    ['interactive evaluation for medical llm',           'large-models'],
    ['medodyssey',                                       'large-models'],
    ['biomedical terminology normalization',             'large-models'],
    ['pan-tumor foundation',                             'large-models'],
    ['mask-attribute alignment',                         'large-models'],
    ['lesiondiffusion',                                  'large-models'],
    ['dentistry: vision foundation',                     'large-models'],
    ['usfm',                                             'large-models'],
    ['medbench',                                         'large-models'],
    ['zept',                                             'large-models'],
    ['cat: coordinating anatomical',                     'large-models'],
    ['deblurring masked image modeling',                 'large-models'],
    ['openmedlab',                                       'large-models'],
    ['meddiff-fm',                                       'large-models'],
    // Medical Agents
    ['ehrworld',                                         'medical-agents'],
    ['medmcp',                                           'medical-agents'],
    ['mix-of-granularity',                               'medical-agents'],
    ['o1 replication journey',                           'medical-agents'],
    ['menti:',                                           'medical-agents'],
    ['meta-tool',                                        'medical-agents'],
    ['diagnosisarena',                                   'medical-agents'],
    ['elicit and enhance',                               'medical-agents'],
    ['enhancing medication consultation',                'medical-agents'],
    // Applications
    ['surgical action planning',                         'applications'],
    ['maxillofacial',                                    'applications'],
    ['mmxu',                                             'applications'],
    ['interactive segmentation and report generation',   'applications'],
    ['iossam',                                           'applications'],
    ['kiut',                                             'applications'],
    ['one-shot weakly-supervised segmentation',          'applications'],
    ['hippocampus segmentation',                         'applications'],
    ['pulmonary airway',                                 'applications'],
    ['efficient subclass segmentation',                  'applications'],
    ['lobe segmentation',                                'applications'],
    ['word: a large scale dataset',                      'large-models'],
    ['contrastive semi-supervised learning for domain',  'applications'],
    ['segmentation only uses sparse annotations',        'applications'],
    ['scalable mammogram retrieval',                     'applications'],
    ['incorporating clinical guidelines',                'applications'],
    ['biomedical terminology normalization',             'applications'],
  ];

  const PROJECT_LABEL = {
    'pathology':      ['Pathology',     'badge-pathology'],
    'large-models':   ['Large Models',  'badge-large-models'],
    'medical-agents': ['Agents',        'badge-agents'],
    'applications':   ['Applications',  'badge-applications'],
  };

  function projectTag(title) {
    const t = (title || '').toLowerCase();
    for (const [pat, proj] of PROJECT_MAP) {
      if (t.includes(pat)) {
        const [label, cls] = PROJECT_LABEL[proj];
        return `<span class="badge ${cls} badge-project">${label}</span>`;
      }
    }
    return '';
  }

  // Badge colour by venue
  function badgeClass(v) {
    if (!v) return 'badge-mint';
    const m = {
      'CVPR':'badge-blue','ICCV':'badge-blue','ECCV':'badge-blue','ICLR':'badge-blue','NeurIPS':'badge-blue','AAAI':'badge-blue',
      'MICCAI':'badge-mint','ISBI':'badge-mint','MIDL':'badge-mint',
      'ACL':'badge-yellow','COLING':'badge-yellow','NAACL':'badge-yellow','EMNLP':'badge-yellow',
      'TMI':'badge-purple','MedIA':'badge-purple','JBHI':'badge-purple','JMIR':'badge-purple',
      'arXiv':'badge-red',
    };
    return m[v] || 'badge-purple';
  }

  function highlight(authors) {
    return (authors || '').replace(/(Xiaofan Zhang)/gi, '<strong>$1</strong>');
  }

  function formatAuthors(authors) {
    if (!authors) return '';
    const list = authors.split(' and ').map(a => a.trim()).filter(Boolean);
    if (list.length <= 10) return highlight(list.join(', '));
    const first5 = list.slice(0, 5);
    const hasXF = list.some(a => /xiaofan zhang/i.test(a));
    const xfInFirst5 = first5.some(a => /xiaofan zhang/i.test(a));
    let shown = first5.join(', ');
    if (hasXF && !xfInFirst5) shown += ', \u2026, Xiaofan Zhang';
    return highlight(shown) + ', et al.';
  }

  function render(pubs) {
    if (!pubs.length) { container.innerHTML = '<p>No publications found.</p>'; return; }

    const byYear = {};
    pubs.forEach(p => { const y = p.year||'n.d.'; (byYear[y]=byYear[y]||[]).push(p); });
    Object.values(byYear).forEach(list => list.sort((a,b) => (a.venue_abbr||'zzz').localeCompare(b.venue_abbr||'zzz')));
    const years = Object.keys(byYear).sort((a,b)=>b.localeCompare(a));

    const html = [];
    years.forEach(year => {
      html.push(`<p class="year-heading">${year}</p>`);
      byYear[year].forEach(p => {
        const venue = p.venue_abbr || '';
        const titleHtml = p.url
          ? `<a href="${p.url}" target="_blank" rel="noopener">${p.title}</a>`
          : p.title;
        html.push(`
          <div class="pub-card">
            <div class="pub-meta">
              ${venue ? `<span class="badge ${badgeClass(venue)}">${venue}</span>` : ''}
              ${projectTag(p.title)}
            </div>
            <p class="pub-title">${titleHtml}</p>
            <p class="pub-authors">${formatAuthors(p.authors)}</p>
          </div>`);
      });
    });
    container.innerHTML = html.join('');
  }

  fetch('publications.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(render)
    .catch(err => {
      container.innerHTML = `<div class="pub-error">
        <strong>Could not load publications.json</strong><br>
        <small>${err}</small>
      </div>`;
    });
})();
</script>
</body>
</html>
