<main class="main">

  <h2 class="section-title" style="margin-top:0;"><span class="star">✦</span> Publications</h2>

<script src="js/main.js"></script>
<script>
(function () {
  const container = document.getElementById('pub-container');

  // Badge colour by venue
  function badgeClass(v) {
    if (!v) return 'badge-mint';
    const m = {
      'CVPR':'badge-blue','ICCV':'badge-blue','ECCV':'badge-blue','ICLR':'badge-blue','NeurIPS':'badge-blue','AAAI':'badge-blue',
      'MICCAI':'badge-mint','ISBI':'badge-mint','MIDL':'badge-mint',
      'ACL':'badge-yellow','COLING':'badge-yellow','NAACL':'badge-yellow','EMNLP':'badge-yellow',
      'TMI':'badge-purple','MedIA':'badge-purple','JBHI':'badge-purple','JMIR':'badge-purple',
      'arXiv':'badge-red',
    };
    return m[v] || 'badge-purple';
  }

  function highlight(authors) {
    return (authors || '').replace(/(Xiaofan Zhang)/gi, '<strong>$1</strong>');
  }

  function formatAuthors(authors) {
    if (!authors) return '';
    const list = authors.split(' and ').map(a => a.trim()).filter(Boolean);
    if (list.length <= 10) return highlight(list.join(', '));
    const first5 = list.slice(0, 5);
    const hasXF = list.some(a => /xiaofan zhang/i.test(a));
    const xfInFirst5 = first5.some(a => /xiaofan zhang/i.test(a));
    let shown = first5.join(', ');
    if (hasXF && !xfInFirst5) shown += ', \u2026, Xiaofan Zhang';
    return highlight(shown) + ', et al.';
  }

  function render(pubs) {
    if (!pubs.length) { container.innerHTML = '<p>No publications found.</p>'; return; }

    const byYear = {};
    pubs.forEach(p => { const y = p.year||'n.d.'; (byYear[y]=byYear[y]||[]).push(p); });
    Object.values(byYear).forEach(list => list.sort((a,b) => (a.venue_abbr||'zzz').localeCompare(b.venue_abbr||'zzz')));
    const years = Object.keys(byYear).sort((a,b)=>b.localeCompare(a));

    const html = [];
    years.forEach(year => {
      html.push(`<p class="year-heading">${year}</p>`);
      byYear[year].forEach(p => {
        const venue = p.venue_abbr || '';
        const titleHtml = p.url
          ? `<a href="${p.url}" target="_blank" rel="noopener">${p.title}</a>`
          : p.title;
        html.push(`
          <div class="pub-card">
            <div class="pub-meta">
              ${venue ? `<span class="badge ${badgeClass(venue)}">${venue}</span>` : ''}
            </div>
            <p class="pub-title">${titleHtml}</p>
            <p class="pub-authors">${formatAuthors(p.authors)}</p>
          </div>`);
      });
    });
    container.innerHTML = html.join('');
  }

  fetch('publications.json')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(render)
    .catch(err => {
      container.innerHTML = `<div class="pub-error">
        <strong>Could not load publications.json</strong><br>
        <small>${err}</small>
      </div>`;
    });
})();
</script>
</body>
</html>
