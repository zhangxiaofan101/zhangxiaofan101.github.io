name: Fetch Publications from Google Scholar

on:
  # Run every Sunday at 02:00 UTC
  schedule:
    - cron: '0 2 * * 0'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit publications.json back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch publications
        run: python scripts/fetch_publications.py

      - name: Commit updated publications.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update publications.json [skip ci]"
          git push
